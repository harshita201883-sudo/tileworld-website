<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>


        /* Location Section */
.Location {
  text-align: center;
  padding: 40px 20px;
  background-color: #0011ffc7;
  color: #ffffff; 
  font-size: 2rem;
  box-shadow: black;
  font-weight: bold;
  text-transform: uppercase;
  border-radius: 10px;
  margin-bottom: 30px;
}

.map-container {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.map-container iframe {
  width: 90%;
  max-width: 800px;
  height: 400px;
  border: 3px solid #ffcc00;
  border-radius: 10px;
  box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
}

@media (max-width: 768px) {
  .Location {
    font-size: 1.5rem;
    padding: 30px 10px;
  }

  .map-container iframe {
    width: 95%;
    height: 300px;
  }
}

.contact-section {
    background: #0011ffc7;
    padding: 30px;
    max-width: 600px;
    margin: 20px auto;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
    border-radius: 8px;
    border: 2px solid #c19a6b;
}

.contact-section h1 {
    color: #ffffff;
    font-size: 26px;
    margin-bottom: 10px;
    text-align: center;
    font-family: 'Georgia', serif;
}

.contact-section p {
    color: #ffffff;
    font-size: 16px;
    margin-bottom: 20px;
    text-align: center;
}

.input-group {
    text-align: left;
    margin-bottom: 15px;
}

.input-group label {
    display: block;
    font-weight: bold;
    color: #ffffff;
}

.input-group input,
.input-group textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid #3043f3;
    border-radius: 5px;
    font-size: 14px;
    background: #fffaf0;
}

.input-group textarea {
    resize: vertical;
}

.submit-btn {
    background-color: #000000;
    color: rgb(0, 85, 255);
    padding: 12px 20px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    font-size: 16px;
    width: 100%;
    font-weight: bold;
    transition: background-color 0.3s;
}

.submit-btn:hover {
    background-color: #ffffff;
}

  
    </style>
</head>
<body>
   

    <!-- location start -->
    <div class="Location">
        <p>Shop Map</p>
    </div>
    <div class="map-container">
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d115906.13297323565!2d66.92157044335936!3d24.793171000000005!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3eb33dcdb0256a71%3A0x38d84f307bad9e93!2sAive%20Karachi!5e0!3m2!1sen!2s!4v1745309441767!5m2!1sen!2s" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div><br><br><br>
    <!-- location end -->

    <!-- contectus starts -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var navLinks = document.getElementById("navLinks");
            var hamburger = document.getElementById("hamburger");
          
            hamburger.addEventListener("click", function () {
                navLinks.classList.toggle("open");
            });
          });
            </script>
             <main>
                <div class="Location">
                    <p>Contect US</p>
                </div>
                <section class="contact-section">
                    <h1>Contact Us</h1>
                    <p>We'd love to hear from you! Please fill out the form below:</p>
                    <form action="#" method="POST">
                        <div class="input-group">
                            <label for="name">Name:</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="input-group">
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="input-group">
                            <label for="message">Message:</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Send Message</button>
                    </form>
                </section>
            </main><br><br>
    <!--contectus end-->        
</body>
</html>
